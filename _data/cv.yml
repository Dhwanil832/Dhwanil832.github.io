cv:
  name: Dhwanil R. Chauhan
  label: Graduate Researcher · Multimodal AI & Agentic Systems
  email: chauha56@purdue.edu
  location: Hammond, IN
  image: ""
  summary: >
    Graduate researcher at the Center for Innovation Through Visualization and Simulation (CIVS),
    Purdue University Northwest. My research focuses on multimodal AI, audio-visual learning,
    and multi-agent systems — building intelligent systems that perceive, reason, and act in
    real-world industrial environments. Published at CVPR Workshop 2026 and AISTech 2025/2026.
    Two papers in preparation targeting IEEE TPAMI and ACL.

